services:
  minepanel:
    image: ketbom/minepanel:latest
    ports:
      - "${BACKEND_PORT:-8091}:8091"
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      # Backend Configuration
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET} # JWT_SECRET environment variable is required. Generate one with: openssl rand -base64 32
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-2d}
      - CLIENT_PASSWORD=${CLIENT_PASSWORD:-admin}
      - CLIENT_USERNAME=${CLIENT_USERNAME:-admin}
      - ALLOW_INSECURE_AUTH_COOKIES=${ALLOW_INSECURE_AUTH_COOKIES:-false}
      - BASE_DIR=${BASE_DIR:-$PWD}
      - COMPOSE_PROJECT=${COMPOSE_PROJECT:-}

      # SMTP settings
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - PASSWORD_RESET_TOKEN_EXPIRES_IN_MINUTES=${PASSWORD_RESET_TOKEN_EXPIRES_IN_MINUTES:-60}
      
      # Frontend Configuration (loaded at runtime)
      - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8091}
      - NEXT_PUBLIC_DEFAULT_LANGUAGE=${NEXT_PUBLIC_DEFAULT_LANGUAGE:-en}

      # Subdirectory Routing (optional). `NEXT_PUBLIC_BASE_PATH` only changes the frontend if the image was built with the same value.
      - BASE_PATH=${BASE_PATH:-}
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
    volumes:
      - ${BASE_DIR:-$PWD}/servers:/app/servers
      - /var/run/docker.sock:/var/run/docker.sock
      - ${BASE_DIR:-$PWD}/data:/app/data
    networks:
      - minepanel-network
    restart: always

  # MC Proxy Router - Routes Minecraft traffic by hostname (optional)
  # Enable with: docker compose --profile proxy up -d
  # Requires DNS wildcard: *.mc.yourdomain.com -> server IP
  mc-router:
    image: itzg/mc-router:1.39.1
    container_name: mc-router
    profiles:
      - proxy
    ports:
      - "${MC_PROXY_PORT:-25565}:25565"
    environment:
      - ROUTES_CONFIG=/data/routes.json
      - ROUTES_CONFIG_WATCH=true
    volumes:
      - ${BASE_DIR:-$PWD}/data/proxy:/data
    networks:
      - minepanel-network
    restart: unless-stopped

networks:
  minepanel-network:
    name: minepanel-network
    driver: bridge
